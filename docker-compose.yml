version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: donafy
      POSTGRES_USER: donafy_user
      POSTGRES_PASSWORD: donafy_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://donafy_user:donafy_pass@postgres:5432/donafy
      NEXTAUTH_SECRET: donafy_secret_key_2024
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - postgres
    volumes:
      - ./public/uploads:/app/public/uploads

volumes:
  postgres_data:
